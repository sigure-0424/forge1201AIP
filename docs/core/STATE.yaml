recent_changes:
  - "2026-04-11: Architecture split + RAG improvement + macro UI (claude/review-architecture-testing-e75tk session): (1) bot_actuator.js split — extracted 1678 lines into 4 new modules under src/actuator/: utils.js (withTimeout, block/bridge spatial helpers), environment.js (getEnvironmentContext, waypoints, path cache, blackboard, safezones, checkpoints, junk list), flight.js (JETPACK_MOD_REGISTRY, detectAviationMethod, flyWithJetpack, flyWithElytra, tryBridgeForward), tools.js (equipment/container helpers, ensureToolFor, MATERIAL_TAG_GROUPS). All modules use ctx singleton (src/actuator/ctx.js) for shared state. bot_actuator.js reduced from 8030 to 6391 lines. (2) Atomic waypoints write — saveWaypoints() in environment.js now writes to .tmp then renames, preventing file corruption under concurrent multi-bot writes. (3) LLM action-first prompt fix — agent_manager.js prompt restructured with ACTION-FIRST RULE at top, Japanese command mappings, wrong/correct examples for 来い→come. (4) RAG improvement — searchForPrompt now uses 5 results (was 3), builds richer query from message keywords + dimension/entity/block environment context. (5) Macro UI dynamic fields — ACTION_FIELDS config maps each action to its relevant inputs, addMacroRow() renders only the relevant fields and rebuilds on action change. Added 📍 button to fill x/y/z from bot's current position. Validation: npm test 6/6 pass 2026-04-11."
  - "2026-04-10: BUGFIX-20260410-003 Docker image stale — bot completely silent (Copilot session): Bot in world but not responding to any input (-hi, -follow, etc). Root cause: forgeaip-bot Docker container was running an image built 25+ hours ago from .claude/worktrees/agent-abdfd2a0/src/agent_manager.js — the pre-fix worktree code that still had `else { console.log('Ignoring unrelated chat during recovery prompt'); return; }` in the awaitingRecoveryChoice else-branch. BUGFIX-20260410-002 fixed this in src/agent_manager.js but the Docker image was never rebuilt. Additionally docker/forge-server/.env did not exist, so OLLAMA_URL env var was empty string in the container; LLM client fell back to localhost:11434 (unreachable from Docker). Fixes: (1) Created docker/forge-server/.env with OLLAMA_URL=http://host.docker.internal:11434/api/generate so container reaches Windows-host Ollama directly. (2) Rebuilt forgeaip-bot Docker image with `docker compose build --no-cache bot-system` to pick up current src/ (includes BUGFIX-20260410-002 auto-decline fix). (3) Restarted bot container with `docker compose up -d --no-deps bot-system`. (4) Bulk-cancelled 73 pending death records in data/deaths_AI_Bot_01.json to prevent immediate re-triggering of recovery prompt after respawn. Verification: docker logs show [LLMClient] Endpoint: http://host.docker.internal:11434/api/generate; sent -hi via API; logs show [AgentManager] Thinking about what WebUI said: '-hi'... then LLM response [{'action':'chat','message':'hi'}] and Bot AI_Bot_01 action count: 1. Bot fully responsive again. No source code changes — deployment-only fix."
  - "2026-04-10: BUGFIX-20260410-002 Chat permanently blocked + path canvas not rendering + LLM lock leak (Copilot session): Three production bugs fixed. (1) awaitingRecoveryChoice permanent block (agent_manager.js): after bot death, recovery prompt set awaitingRecoveryChoice=true for botId; all subsequent user messages that were not 'y'/'n' hit an else-return and were silently discarded forever, making the bot completely unresponsive to chat instructions until the user manually typed 'n'. Fix: replaced the silent return in the else-branch with auto-decline logic: awaitingRecoveryChoice is set to false and execution falls through to normal instruction processing. (2) activeLlmRequests lock leak (agent_manager.js): processChatWithLLM was called without .catch() in processNextQueueItem; any unhandled rejection left activeLlmRequests.has(botId)=true permanently, deadlocking the queue. Fix: added .catch() that logs the error, releases the lock via activeLlmRequests.delete(botId), and calls processNextQueueItem(botId) to drain remaining items. (3) Path canvas not renderable from remote browser (public/index.html + public/app.js): debug canvas WS hardcoded to ws://localhost:3001, which resolves to the browser's own machine when accessed remotely — always disconnected. Fixed to ws://+location.hostname+:3001. Additionally app.js had no path_update case in ws.onmessage despite agent_manager broadcasting path_update events through the main WS on port 3000; added case 'path_update': that fires window.dispatchEvent(forgeaip_path_update). Added case augmentation in bot_status to dispatch forgeaip_status_update with pos/action/health fields. Added window.addEventListener handlers in index.html canvas code for both events as main-WS fallback path so path drawing works even when port 3001 is unreachable. (4) Data cleanup: reset stale in_progress tasks (1,3,4) to pending; cancelled all pending death entries in deaths_AI_Bot_01.json (1 entry) and deaths_AI_Bot_02.json (4 entries) to prevent spurious recovery prompts. Validation: npm test 6/6 pass 2026-04-10."
  - "2026-04-10: BUGFIX-20260410-001 BigInt chat crash + flying-kick loop (Copilot session): Bot was crashing ~3s after every connect with `TypeError: Cannot mix BigInt and other types` in `minecraft-protocol/src/client/chat.js:197`. Root cause: TASK-20260409-004 removed `player_chat`/`system_chat` from the `restBuffer` bypass — but Forge 1.20.1 `player_chat` packets use BigInt fields (index/timestamp/salt) that minecraft-protocol's 1.20.1 handler cannot safely process. Fix (1): In `hardenClientChatParsers()` patchedEmit, added try-catch around `originalEmit` calls for all chat events (`player_chat`, `system_chat`, `profileless_chat`, `disguised_chat`). On catch for `player_chat`, extracts `pkt.message` + resolves sender UUID via `bot.players` and manually emits `bot.emit('chat', ...)` fallback so player commands still reach AgentManager. Fix (2): Broadened `uncaughtException` handler to catch ANY error from `chat.js` (not just the `\"reading '0'\"` pattern), preventing any new chat crash variant from killing the process. Fix (3): Added `come`, `fly`, `follow` to `NON_RESUMABLE_ACTIONS` — these actions involve jetpack physics that trigger flying kicks, and restoring them from checkpoint on reconnect caused an immediate kick loop. Fix (4): `bot.on('kicked')` now clears the queue checkpoint when reason includes 'fly' or 'float', preventing the flying-kick → reconnect → kick loop from repeating. Result: bot stays connected indefinitely (verified 1.5+ minutes stable after fix vs. 3-second crash before). Validation: `npm test` 6/6 pass 2026-04-10."
  - "2026-04-10: TASK-20260409-004 runtime chat-command recovery (Copilot session): Restored inbound player command handling in `src/bot_actuator.js` by removing over-broad chat packet bypass/no-op hooks that effectively suppressed `player_chat`/`system_chat` processing. Root cause: startup protocol patch rewired all `*_chat` packets to `restBuffer` and detached fragile chat listeners, so in-game prefixed commands like `-hi`/`-follow me` never reached AgentManager. Fix scope: keep compatibility bypass for non-chat packets (`declare_commands`, registry/particle-heavy packets) and preserve normal chat event flow. Validation: `npm test` 6/6 pass on 2026-04-10."
  - "2026-04-09: TASK-20260409-004 execution-path hardening (Copilot session): Fixed four runtime orchestration blockers. (1) LLM auto-bootstrap: `scripts/run_experimental_instruction_suite.js` now reads `.env` and calls `PUT /api/config` at startup to inject OLLAMA_URL/MODEL/KEY/AUTH_SCHEME when `GET /api/config` returns empty ollamaUrl, preventing silent no-op runs. (2) Docker localhost fallback: `src/llm_client.js` detects `/.dockerenv`, retries failed requests with `host.docker.internal` replacing `localhost`/`127.0.0.1`, and permanently switches `this.url`+`process.env.OLLAMA_URL` on success — fixing Docker container's inability to reach host Ollama at localhost:11434. (3) LLM error visibility: `src/agent_manager.js` on null action now sends `[System] LLM unavailable: <lastError>` to bot chat/log instead of silently returning. (4) Death recovery auto-clear: runner added `hasPendingRecoveryPrompt()`+`clearPendingRecoveryPrompt()` to send 'n' before each case when `awaitingRecoveryChoice` is blocking; added `waitForCaseActivity()` to gate case completion on non-WebUI log activity or `isExecuting=true` instead of racing idle check. Result: experimental suite progressed from infra-fatal to 1/9 real pass (z7-durability-minimal); all 9 cases now execute. npm test 6/6 pass 2026-04-09."
  - "2026-04-09: TASK-20260409-004 validation update: fixed false-pass logic in `scripts/run_experimental_instruction_suite.js` by evaluating only logs generated after each case dispatch (previously pre-dispatch reset `status` logs could satisfy expect regex and report false 9/9 PASS). True rerun result became 0/9 PASS with only WebUI echo lines and no action completion evidence. Root cause identified via `GET /api/config`: `ollamaUrl` unset (LLM not configured), so chat-mode instructions produced no actionable outputs. Added chat-mode preflight to fail fast with explicit error when `/api/config.ollamaUrl` is empty."
  - "2026-04-09: TASK-20260409-004 policy update implemented: added instruction-driven experimental suite runner (`scripts/run_experimental_instruction_suite.js`) that tests capability by issuing natural-language instructions (not preloading all intermediate materials). Runner enforces per-case timeout, idle-stable completion checks, pass/fail evidence from chat logs, and JSON reports. Added parallel zone sharding support across multiple server stacks via `--shard-config` and `scripts/experimental_shards.example.json`. Added npm scripts `test:experimental` and `test:experimental:parallel`. Smoke check: `node scripts/run_experimental_instruction_suite.js --mode chat --cases z1-bridge-move --timeout-sec 40 --idle-grace-sec 4` passed (1/1)."
  - "2026-04-09: Experimental-world exhaustive validation execution started (TASK-20260409-004). Confirmed runtime readiness via Docker/API (`forgeaip-mc-server` healthy, `forgeaip-bot` up, `AI_Bot_01` online). Verified direct action API contract in src/web_ui_server.js: `POST /api/bots/:id/actions` with `{actions:[...],queue_op}` queue_op in `replace|append|ignore`. Derived all 9 zone target coordinates from server log spawn `(-96,69,-96)` and TestWorldGenerator spacing. Executed zone sweep runs and captured reproducible blockers: repeated queue-overwrite interruptions (`Task interrupted`), long-distance goto non-completion (`Failed to reach destination ...` / `Took to long to decide path to goal!`), repeated death interruptions, and prerequisite-chain failures (`Cannot craft oak_planks: missing materials`, `Could not find cobblestone/stone/oak_log within 128 blocks`)."
  - "2026-04-09: Test-world auto generation + clean Docker world reset + queued -goto + integration debug (TASK-20260409-003): Added server-side `TestWorldGenerator` that reads forgeaip_registry.json and builds 9 test zones around spawn for movement/maze/block-break/item-use/mineall/craft/durability/jetpack/combat validation. Added safety filter for risky mod blocks (copycat/controller/block-entity) and world-scoped marker `world/forgeaip_testworld_generated.marker`. Added Docker clean-boot world wipe toggle (`RESET_WORLD_ON_BOOT`) and compose hardening (25566 internal port alignment, host MC-port publish removal to avoid conflicts, robust health gating). Added direct queued chat `-goto x y z` parser in bot_actuator (supports `~` relative tokens) for command-block burst compatibility. Updated bot container base to Node 22 and synced lockfile for npm ci. Live validation: Forge logs show `[TestWorldGenerator] Generated all zones...` and fresh `[BlockRegistryExporter] Registry written...`; marker and registry timestamps confirmed under E:/forge1201server; bot container handshake and authoritative registry apply confirmed. npm test 6/6 pass 2026-04-09." 
  - "2026-04-09: Come jetpack forever-fly + goto hollow-below-hill escape (BUGFIX-20260409-002): Two runtime bugs fixed. (1) Come jetpack landing fix: ACTIVE→IDLE condition changed from `bot.entity.onGround&&dy<5` to `dy<5&&dist<4`. Root cause: `_jFlyTick` hover branch outputs `velocity.y=0.06` (fights gravity -0.08/tick) so bot.entity.onGround never becomes true; bot hovered at player Y indefinitely. Fix: removed onGround requirement; when dy<5&&dist<4 (close enough in 3D), call `_jStop()` then `setControlState('sneak',true)` for jetpack fall-protection. (2) Goto hollow-below-hill escape: added jetpack fallback at start of severe stuck recovery (`_stuckCount>=5`). When `destY-botY>=8` AND jetpack equipped AND fuel>fuelCritical, calls `flyWithJetpack(destX,destY+2,destZ,config,cancelToken)` to fly over obstacle and land near destination, resets `_stuckCount=0` and `_stLastPos/Time`, then continues XZ streaming loop. Addresses scenario: bot routed into cave at XZ-correct position beneath hill (GoalXZ ignores Y), solid ceiling prevents force-walk/bridge, jetpack is the only escape path. Previously, severe recovery chain was: jump→sidestep→force-walk/bridge/elytra with zero jetpack option. Validation: npm test 6/6 pass 2026-04-09."
  - "2026-04-09: Come jetpack fall-loop + goto vertical-blind + LLM portal misfire (BUGFIX-20260409-001): Fixed three runtime bugs. (1) Come jetpack fall-loop: _jFlyTick used constant velocity.y=0.28 with no altitude feedback; ACTIVE→IDLE on dy<3 (fired mid-air); pathfinder GoalXZ + jump=true conflicted for XZ movement. Fix: added _jTargetY (updated each 700ms interval tick from p.y); _jFlyTick now uses PID (ascending if diff>0.5, gentle descent cap if diff<-1.5, hover vy=0.06 otherwise); ACTIVE→IDLE only when bot.entity.onGround&&dy<5 (never mid-air); _jStart now calls bot.pathfinder.setGoal(null)+setControlState(forward/sprint,true) for manual airborne steering; interval ticks call bot.lookAt(p-at-bot-Y) for direction. (2) Goto didn't use jetpack for high-up destinations: jetpack promotion only triggered at XZ>=80 blocks, ignoring large vertical gap. Added JETPACK_GOTO_MIN_DY=30 (blocks vertical rise); trigger is now (_jXZDist>=80 OR _jDY>=30). (3) LLM navigated to End after goto stuck: CRITICAL rule added to agent_manager: if SYSTEM FEEDBACK says 'Failed to reach destination', respond ONLY with status action, never navigate_portal or dimension-travel. Validation: npm test 6/6 pass 2026-04-09."
  - "2026-04-08: Come jetpack follow redesign (BUGFIX-20260408-005): Root-cause fix for 'fly up then stop' loop in come action. Previous approach delegated to flyWithJetpack() which always descends and lands after reaching the target (Phase 3 landing wait up to 12s), causing a fly→land→stop→7s cooldown→fly loop. Replaced with an inline jetpack state machine (_jActive/_jStart/_jStop) that installs/removes a physicsTick hook (velocity.y=0.28 constant upward thrust) and manages jump=true/false directly. Transition IDLE→ACTIVE when dy>=8 and jetpack equipped with fuel above critical; ACTIVE→IDLE when dy<3. While ACTIVE: setGoal(GoalXZ) for horizontal pursuit; bridge checks skipped. While IDLE: normal setGoal(GoalNear). No cooldown: state flips purely on live dy, so bot re-activates immediately if player moves up again. Also cleaned up all three exit paths (cancel, lost-sight, dimension-change) to call _jStop() to guarantee physicsTick cleanup. Validation: npm test 6/6 pass 2026-04-08."
  - "2026-04-08: Come jetpack follow deadlock fix (BUGFIX-20260408-004): Fixed a follow stall where the bot could look at an airborne target but stop moving after jetpack assist. (1) In come supervision, pathfinder setGoal updates are now skipped while _comeAerialBusy is true, preventing concurrent GoalNear writes from fighting flyWithJetpack control states. (2) Aerial assist trigger widened from strict horizontal-gap gate (dist>=12) to (dist>=5 OR dy>=18), so near-vertical targets above the bot can re-trigger lift hops instead of stalling under them. (3) Follow goal selection now uses GoalXZ when |dy|>=8 and GoalNear otherwise, avoiding deadlock on unreachable airborne 3D GoalNear targets while still converging in XZ. Validation: npm test 6/6 pass 2026-04-08."
  - "2026-04-08: Follow jetpack descent guard + detailed path overlay fix (BUGFIX-20260408-003): (1) Added path_update-based path broadcasting with downsampling (up to 80 points) so overlays display actual traversed route shape instead of only start/end vectors. (2) Hardened come aerial assist to avoid unnecessary high-flight: require fresh tracked snapshot (updatedAt<=5s), require horizontal gap (dist>=12), and cap assist target altitude to currentY+18. (3) Fixed runtime crash regression by moving listener from bot.pathfinder.on(...) to bot.on('path_update'). Live validation on test server MC port 25566: WS capture reported PATH_COUNT 125 / MAX_POINTS 30 during goto movement; follow scenario with Seia_Y remained stable without path overlay regression. npm test 6/6 pass 2026-04-08."
  - "2026-04-08: Follow vertical tracking + VDS path overlay fix (BUGFIX-20260408-002): (1) VDS instrumentation now wraps both pathfinder.goto and pathfinder.setGoal, so path events are emitted for streaming-goal movement (goto XZ streaming, come/follow loops) rather than only one-shot goto calls; restores path visualization in both Web UI debug map and aux_mod DebugOverlay. (2) come action now includes jetpack-based aerial assist: when target Y is significantly above bot (dy>=10), bot has a jetpack, and fuel is above configured low threshold, it performs throttled flyWithJetpack hops toward the tracked player position to close vertical gaps that ground pathing cannot reach. (3) Existing server-authoritative GoalNear tracking remains active, so XZ and Y updates continue naturally after landing. Validation: npm test 6/6 pass 2026-04-08."
  - "2026-04-08: Jetpack fuel management + safe descent + goto integration (BUGFIX-20260408-001): (1) getJetpackFuelRatio(): universal fuel reader — traverses fuelNbtPath/fuelNbtMaxPath or probes common FE/RF/pressure NBT keys (Energy/MaxEnergy/Air/MaxAir/Charge/RF/Pressure), falls back to item durability as universal proxy; handles Mineflayer's typed-NBT {type,value} wrapping. (2) JETPACK_MOD_REGISTRY fuel metadata: all 14+ entries now have fuelType ('durability'/'nbt_fe'/'auto') + per-mod fuelNbtPath/fuelNbtMaxPath. (3) flyWithJetpack() fuel lifecycle: PRE-flight check refuses if <=fuelCritical(5%) with IPC REFUEL message; Phase 1 checks every 100ms, Phase 2 checks every 5s — abort on critical. Post-landing reports critically low fuel to AgentManager (enables wiki RAG refuel lookup). (4) Safe descent: Phase 3 transitions physicsTick to 'descend' mode (caps velocity.y >= -0.15), holds sneak (triggers most mods' fall-damage prevention server-side), then clears all states on landing. (5) goto→fly auto-promotion: JETPACK_GOTO_MIN_DIST=80 blocks; if jetpack equipped with fuel>fuelLow and dist>=80b, inserts [fly, goto(_noJetpack:true)] pair into queue — goto lands near destination for any residual XZ gap. _noJetpack flag prevents infinite loop. npm test 6/6 pass 2026-04-08."
  - "2026-04-07: Universal jetpack architecture (BUGFIX-20260407-006): Extended jetpack system to support any modded jetpack seamlessly. JETPACK_MOD_REGISTRY redesigned: removed `ascendControl` field, added `activateMethod` ('none'|'right_click'|'auto') and `hoverMode` (bool). Category A passive mods (Simply Jetpacks, Create Jetpack, create_sa, Jetpacks!, PneumaticCraft, Mekanism, Powah, Iron Jetpacks, BiggerReactors, ExtremeReactors): activateMethod='none'. Category B right-click toggle mods (Thermal Series, Ender IO, IC2, IC2Classic, Galacticraft, AdvancedRocketry): activateMethod='right_click' — activateItem() fired in Phase 0 to toggle ON and Phase 3 to toggle OFF. Category C hover mods (Modular Powersuits): hoverMode=true — jump released during cruise so natural hover engages; tap-jump used for altitude correction. Generic _generic fallback: activateMethod='auto' — tries passive first, right-click recovery on stall. Universal stall detector in Phase 1: if not rising 3s with jump held, fires activateItem() recovery (max 2 attempts) for 'auto'/'right_click'; 'none' mods log fuel exhaustion and exit early. Phase 2 hoverMode branch added. npm test 6/6 pass 2026-04-07."
  - "2026-04-07: Jetpack physics override fix (BUGFIX-20260407-005): Diagnosed and fixed 'bouncing in place' bug in flyWithJetpack(). Root cause: Mineflayer's built-in physics engine applies gravity (-0.08/tick) each physicsTick, causing setControlState('jump',true) to fire a one-shot upward impulse that gravity immediately cancels → bot bounces on ground. Also removed incorrect bot.activateItem() calls (right-click) from all jetpack phases — Create Jetpack mod does NOT use right-click activation; it reads player.jumping from the player_input packet (0x16) sent automatically by Mineflayer when setControlState('jump',true) is active. Fix: (1) Removed activatePulse:true from JETPACK_MOD_REGISTRY entries for create_jetpack and create_sa. (2) Rewrote flyWithJetpack() to hook physicsTick (fires AFTER physics step) and overwrite bot.entity.velocity.y each frame: 0.28 during ascent (net lift ≈0.20 b/tick after gravity), proportional PID hold during cruise. This overrides gravity without interfering with player_input jump=true propagation. Phase 3 removes the hook and clears controlStates so normal gravity resumes for landing. npm test 6/6 pass 2026-04-07."
  - "2026-04-07: Server-side follow fix + entity tracking root-cause (BUGFIX-20260407-004): Forge server log confirmed Seia_Y connects via IPv6 (2404:7a85:c980:7600:) from a different device — client-side aux_mod on the local Windows machine was never sending data. ServerPlayerTracker.java already existed and was correctly writing forgeaip_players.json every 40 ticks; bot was not reading it. Added setInterval(2000) in bot_actuator.js that polls forgeaip_players.json from candidate paths (MC_SERVER_DIR env / E:/forge1201server / cwd) and populates _externalPlayerPositions — same map used by come/follow action gate. Live verification: forgeaip_players.json confirmed at 18:45 with Seia_Y at (-274.68, 132.00, -24.95). Background task also confirmed fly-kick→come cascade: each flying kick destroyed the socket, making subsequent come actions drop with 'Socket not writable'. Added [WebUI] entity_update receipt logging to web_ui_server.js. npm test 6/6 pass. Requires bot system restart to activate polling."
  - "2026-04-07: Four-bug batch fix from debug_trace.jsonl + bot_system.log analysis (BUGFIX-20260407-003): (1) BUG-A: _stuckSeconds carry-over across actions — added _stuckLastAction variable; stuck interval resets _stuckSeconds=0 whenever currentAction changes, preventing carry-over from previous action. (2) BUG-B: false stuck detection on non-movement actions — added MOVEMENT_ACTIONS Set (goto/come/follow/collect/explore/fly/kill etc.); stuck detection only fires when currentAction is in the set, eliminating false positives on chat/give/equip/wait. (3) BUG-C: multiplayer.disconnect.flying kicks (9 confirmed on 2026-04-05) — added _setServerFlyingFlag(flying) helper that writes abilities packet with flags=0x06 (flying|allowFly) before jetpack ascent and flags=0x00 after landing, satisfying Forge's anti-cheat check. (4) BUG-D: goto XZ streaming loop stuck 455s — sidestep escape resets _stuckCount=0 preventing the >=7 abort condition from ever firing; fixed by adding _gotoLoopStart timestamp before the while-loop and hard-breaking with gotoAborted=true when Date.now()-_gotoLoopStart > wpTimeout (min 120s). Also updated debug_trace_logger.js: changed fs.appendFile (async, errors silently dropped) to fs.appendFileSync (sync, errors propagated) in logEvent() and logStatus() per VDS-001 spec. Validation: npm test 6/6 pass 2026-04-07."
  - "2026-04-07: Three-issue batch fix (BUGFIX-20260407-002): (1) Follow/tracking restored — ClientEvents.java re-adds players[] array to both periodic tick snapshots and chat-triggered snapshots; each entry is {name,x,y,z,dim} for all loaded client players other than self, restoring out-of-view follow capability broken by BUGFIX-20260406-002. (2) Create Jetpack / create_sa flight fix — added create_sa namespace to JETPACK_MOD_REGISTRY with itemPattern /jetpack_chestplate/i covering brass/andesite/copper/netherite variants; added activatePulse flag to both create_jetpack and create_sa entries; rewrote flyWithJetpack() Phase 0 to fire bot.activateItem() after a ground-leaving jump to toggle the jetpack ON before ascent, add a stall detector that re-fires activateItem() every 2s if Y is not rising, and fires deactivation pulse on landing. (3) Forge server Docker containerization — created docker/forge-server/compose.yaml (two-service stack: forge-server using itzg/minecraft-server:java17 TYPE=FORGE VERSION=1.20.1 FORGE_VERSION=47.4.10, and bot-system using new docker/bot.Dockerfile, connected via forgeaip-net bridge network, healthcheck on mc-health, SERVER_DIR env var selects existing server directory for mods/config mount); created docker/forge-server/Dockerfile (standalone Forge 1.20.1-47.4.10 image for CI/offline, installs via Forge installer, VOLUME for mods/config/world); created docker/bot.Dockerfile (Node.js 18-slim bot container, exposes 3000/3001); created docker/forge-server/.env.forge.example (configuration template). Validation: npm test 6/6 pass 2026-04-07."
  - "2026-04-07: Authoritative registry delivery via aux_mod file export (BUGFIX-20260407-001): Fixed modded item 'unknown' issue and aux_mod build failures. (1) aux_mod/src/main/java/com/forgeaip/auxmod/BlockRegistryExporter.java: new server-side @Mod.EventBusSubscriber that fires on ServerStartedEvent, builds JSON of all non-minecraft: block state ID ranges (GameData.getBlockStateIDMap()) and item numeric IDs (ForgeRegistry.getID()), writes to forgeaip_registry.json in server working dir. Replaced previous HTTP-POST approach with file-write (simpler, no firewall/size/method issues). (2) aux_mod/src/main/java/com/forgeaip/auxmod/client/DebugOverlay.java: replaced okhttp3 (unavailable on server side) with java.net.http.WebSocket; removed deprecated com.mojang.math.Matrix4f reference. (3) src/dynamic_registry_injector.js: added injectFromServerRegistry(serverData) that injects authoritative block state ID ranges and item numeric IDs, fixing items previously showing as 'unknown'. (4) src/bot_actuator.js: handshake_complete handler reads registry from MC_SERVER_DIR/forgeaip_registry.json (with fallback candidates); added create_jetpack to JETPACK_MOD_REGISTRY. (5) src/web_ui_server.js: express.json({ limit: '10mb' }) + POST/GET /api/block-registry endpoints. Live verification: server writes 317923-byte registry; bot applies 1358 mod blocks + 1604 mod items; [Actuator] Authoritative server registry applied confirmed."
  - "2026-04-06: Aux-mod telemetry simplification (BUGFIX-20260406-002): Updated aux_mod client snapshots to send only minimal player tracking fields independent of viewport context. In aux_mod/src/main/java/com/forgeaip/auxmod/client/ClientEvents.java, periodic and chat-triggered /api/entity_updates payloads were reduced to {playerName, position{x,y,z}, dimension} and all view-derived fields (targetedBlock, nearbyEntities, players list) were removed. In aux_mod/src/main/java/com/forgeaip/auxmod/command/BotCommand.java, command-time snapshot payload for /bot chat was similarly reduced to the same minimal shape. Validation: Java diagnostics report no errors for edited files. npm test not re-run for this Java-only telemetry change; smoke_status unchanged from last full run."
  - "2026-04-06: Follow visibility + flight-intent hardening (BUGFIX-20260406-001): In src/bot_actuator.js come supervision no longer aborts immediately on one missing external snapshot; added last-known position fallback (30s) and missing-snapshot grace window (15s) before declaring lost sight. In src/agent_manager.js added explicit fly action docs/prompts, self-reference target normalization for come/give (maps player_name/me to actual chat issuer), and jetpack/elytra intent promotion (goto->fly with coordinate fallback parsing), so 'use jetpack' instructions no longer degrade into unknown/chat responses. Validation: npm test 6/6 pass."
  - "2026-04-05: Visual Debug System implementation (VDS-001): Added end-to-end behaviour visualisation and test tracking. Created src/debug_trace_logger.js (appendFileSync JSONL events: start/complete/fail/stuck, 10 MB rotation). Created src/debug_ws_server.js (ws WebSocket server on port 3001, broadcasts path/stuck/mismatch/status messages, EADDRINUSE-safe). Created src/debug_mismatch_detector.js (compares bot internal block state vs chunk_dump.json, CLI entry point). Created src/obs_connector.js (optional OBS WebSocket recording on stuck, silently skips if OBS_WS_URL unset). Modified src/bot_actuator.js: added require of all three debug modules at top; logEvent calls at action start/complete/fail; 5s stuck detection interval with stuckSeconds counter + WS broadcast; debugWS.broadcast('status') in 5s ai_debug interval; pathfinder.goto wrapper broadcasts path goal; !mismatch chat command triggers detectMismatches + broadcast. Modified public/index.html: appended Canvas-based 2D 600x600 debug map panel with 5 rendering layers (block grid/mismatch/path/bot/stuck), auto-reconnecting WebSocket client, chunk_dump.json fetch throttled to 5s. Created tests/test_manifest.json (version:1, 11 categories, 19 test entries with id/desc/script/tags). Created tests/run_tests.js (--category/--id filtering, require-based execution, results/test_report_*.json output, PASS→FAIL regression diff). Modified package.json: added obs-websocket-js dependency and test:runner script. Created aux_mod/src/main/java/com/forgeaip/auxmod/client/DebugOverlay.java (OkHttp WS client, CopyOnWriteArrayList path/mismatch, volatile stuck/botPos, RenderLevelStageEvent rendering with yellow path lines, red wireframe mismatch cubes, red filled stuck cube, F8 toggle). Wired DebugOverlay.init() in AuxMod.clientSetup and F8 toggle in ClientEvents. Validation: npm test 6/6 pass."
  - "2026-04-05: Multi-container scan + deictic pronoun strictness fix (BUGFIX-20260405-002): Resolved persistent failure where nearby container instructions only checked one nearest chest and stopped. In src/bot_actuator.js: added _listContainerCandidates() and rewired withdraw/deposit/transfer actions to iterate across multiple nearby candidate containers (sorted by distance) instead of single-container early exit; transfer now retries across multiple source/destination containers per trip. In src/agent_manager.js: expanded deictic container phrase detection to include pronouns like これ/それ/あれ and this one/that one, so looked-at chest references are recognized more reliably. Validation: npm test 6/6 pass."
  - "2026-04-05: Nearby/deictic container targeting reliability fix (BUGFIX-20260405-001): Addressed remaining failures where 'nearby chest' only checked very short range and 'this chest' sometimes bound to the nearest chest instead of the looked-at chest. In src/agent_manager.js: (1) deictic coordinate injection now reads targetedBlock from both live botStatus and current chat environment payload fallback, improving robustness when one feed is stale; (2) container-intent nearby actions now default to a wider search distance (96); (3) forced container intent item extraction no longer normalizes the whole sentence as an item id, preventing malformed item targets. In src/bot_actuator.js: _resolveContainerCoords now uses progressive radius search (32→64→96→requested, capped) with larger candidate count instead of a fixed short lookup. Validation: npm test 6/6 pass."
  - "2026-04-04: Container intent hardening for nearby chest workflows (BUGFIX-20260404-006): Fixed a critical behavior gap where chest-transfer instructions could still drift into unrelated actions (initial smooth_stone equipment chest lookup, world block mining, and non-deposit follow-up). In src/agent_manager.js, added deterministic post-LLM enforcement for container intents: when user text includes chest/container withdraw+store semantics (e.g. 'nearby chest ... store in shulker'), action output is force-normalized to container-native actions (transfer_between_containers / withdraw_from_container / deposit_to_container) instead of allowing collect/find_and_equip drift. Added stack-count parsing (N stacks -> N*64), nearby-intent radius defaulting, and Japanese/English item alias normalization (including 滑らかな石 -> smooth_stone). Extended deictic coordinate injection to transfer_between_containers source endpoints so 'このチェスト / this chest' now binds coordinates even in transfer actions. In src/bot_actuator.js, added Japanese-aware normalization for container kinds and item names, and wired normalized item keys into withdraw/deposit/transfer resolution so JP item labels reliably map to registry IDs. Validation: npm test 6/6 pass."
  - "2026-04-04: Container interaction + deictic chest + multi-trip transfer fix (BUGFIX-20260404-005): Addressed four container workflow issues. (1) withdraw_from_container now supports omitted coordinates by resolving nearest matching container (chest/barrel/shulker), fixing behavior where 'nearby chest' requests fell back to unrelated equipment-chest flows. (2) AgentManager now resolves deictic references ('このチェスト/that chest') by injecting PLAYER IS LOOKING AT container coordinates into withdraw/deposit actions when omitted. (3) Added new deposit_to_container (alias store_in_container) action to put items into chest/barrel/shulker. (4) Added transfer_between_containers action that shuttles large quantities in multiple trips between source and destination containers, enabling thousand-item moves even with limited carry capacity. Validation: npm test 6/6 pass."
  - "2026-04-04: Elytra/bridge/tracking/parkour/shulker stabilization (BUGFIX-20260404-004): Addressed five live issues. (1) Movement safety tuned for hole-drop prevention: maxDropDown tightened to 1 and parkour jumps disabled in Movements to reduce accidental falls into small plain-terrain holes. (2) Bridge stall mitigation broadened: added hasLikelyBridgeNeed() edge detection so bridge recovery triggers even when strict hasForwardGap() misses terrain geometry; integrated into come/goto recovery branches to prevent endless jump loops at gap edges. (3) Out-of-view player pursuit hardened: name matching normalized/fuzzy, snapshot TTL extended 15s→120s, and EXTERNAL_ENTITY_UPDATE now also ingests player entries found in nearbyEntities payloads for compatibility with older aux payloads. (4) Elytra traversal fallback added: when bridging/hazard crossing fails and Elytra + firework_rocket are available, bot attempts an Elytra boost gap-cross instead of hard-failing movement. (5) Shulker infinite-lift mitigation: projectile evasion now prioritizes close-range shulker_bullet interception via attack before shield/dodge flow. Validation: npm test 6/6 pass."
  - "2026-04-04: Out-of-view player tracking + bridge reliability + macro UI clipping fix (BUGFIX-20260404-003): Addressed four live issues. (1) Aux mod entity snapshots now include a dedicated players array for all loaded client players (not only render-near entities), and Node actuator ingests that list into _externalPlayerPositions with case-insensitive lookup; this restores come-follow fallback when targets are out of view/range. (2) Bridge hesitation reduced by restoring responsive pathfinder timing (thinkTimeout=5000, tickTimeout=5) to avoid long decision stalls near void edges. (3) Bridge error diagnosis now distinguishes no-block-in-inventory from placement-failed edges, so the bot no longer reports a false 'no solid placeable blocks' message when blocks exist but placement geometry failed. (4) WebUI macro builder clipping fixed by widening modal constraints, enabling horizontal overflow handling, and making message column sizing flexible. Validation: npm test 6/6 pass."
  - "2026-04-04: Knowledge UI operations + crawl continuation (TASK-20260404-002): Added WebUI knowledge operations for local wiki corpus. Backend now exposes GET /api/knowledge/status (reads crawl status/frontier/pages) and POST /api/knowledge/search (wiki_rag-backed local retrieval). Frontend dashboard adds a new Knowledge panel with crawl metrics, query input, result-count control, refresh action, and ranked snippet rendering. Continued Crawl4AI ingestion via Docker (npm run crawl:wikis -- --max-pages 900 --max-new 600): this run crawled 602 pages and saved 600, corpus now 1470 pages, frontier tracked for continuation. Validation: npm test 6/6 pass."
  - "2026-04-04: Crawl4AI wiki ingestion/search integration (TASK-20260404-001): Added Docker crawler pipeline for https://wiki.createmod.net/ and https://minecraft.wiki/ using unclecode/crawl4ai:0.8.5 (`scripts/crawl_wiki_sources.py` + `scripts/run_crawl_wikis.js` + npm `crawl:wikis`). Crawler removes ad/consent/overlay elements, excludes external/media links, and persists resumable corpus in `data/processed/wiki_crawl/pages.jsonl` with frontier `state.json` and failures log. `src/wiki_rag.js` now indexes recursively from `data/wiki/**` and ingests Crawl4AI JSONL corpus from processed storage, with markdown/url cleanup and improved ranking bonuses for internal search usability. Crawl executed in Docker (current corpus: 870 pages, frontier tracked for continuation). Runtime status report written to `data/wiki/crawl4ai_status.md`. npm test: 6/6 pass."
  - "2026-04-03: Follow/locate/UI+knowledge batch (BUGFIX-20260403-006): (1) come action now keeps GoalFollow for visible targets while still running forward-gap bridge checks; this removes follow stalls caused by GoalNear reapplication. (2) BOT_STATUS now includes explicit currentAction from processActionQueue, fixing HUD/web status lines that stayed at idle while actions were in-flight. (3) goto structure targeting now normalizes aliases (e.g. end city/end_city/nether fortress) and parses /locate results from both messagestr and JSON chat payloads with failure diagnostics. (4) Aux HUD now computes background width from measured text width and shows working/idle fallback action state. (5) LauncherScreen now includes quick add/remove bot controls, and BotCommand /bot start payload key fixed to name. (6) WebUI gained direct /api/bots/:id/actions endpoint plus a macro-builder modal (form-based rows, local save/load, run without hand-written JSON punctuation). (7) Added mod knowledge index builder (npm run build:mod-index) and generated data/wiki/modpack_index.md; runtime capture is explicitly reported unavailable when data/raw has no files. npm test: 6/6 pass."
  - "2026-04-03: Follow/ID/UI reliability batch (BUGFIX-20260403-005): Addressed multi-system issues reported after bridge fixes. (1) come action now supports out-of-visibility pursuit by consuming external player snapshots relayed from /api/entity_updates; when target entity is not rendered, bot falls back to GoalNear(latest player coordinates) and resumes GoalFollow when target reappears. (2) come fallback now attempts bridge placement over forward void gaps using existing hasForwardGap/tryBridgeForward helpers, improving long-range follow over void. (3) give action no longer relies solely on registry ID lookup; it now resolves actual inventory stacks by namespaced/full/short-name matching and tosses concrete stacks to avoid wrong-item handoff in modded registries. (4) auto-armor now preserves Elytra on torso and movement maxDropDown tuned 3→2 to reduce accidental fall deaths. (5) WebUI now relays /api/entity_updates to child bot IPC and adds a periodic selected-bot chat-log reconciliation fallback on the client, reducing stale chat panel behavior if WebSocket events are missed. (6) WebUI startup now auto-retries on next port when EADDRINUSE occurs instead of crashing node index.js. npm test: 6/6 pass."
  - "2026-04-03: Long-bridge efficiency and premature-stop mitigation (BUGFIX-20260403-004): Addressed three live issues during long void traversal: (1) occasional stop with large remaining distance, (2) repeated 2-3 block bridge cadence with frequent pause/retry chatter, (3) reroute thrashing toward nearby islands during bridge construction. Fixes in goto XZ streaming loop: added gotoAborted tracking and strict completion gate (do not report success when far from target), added auto-retry for interrupted long-distance goto (up to 3 retries with _gotoRetryCount), introduced bridge-lock heading (`_bridgeLock`) to keep forward momentum after bridge placement and reduce micro-reroutes, increased bridge burst placement counts in recovery branches, and added proactive bridge extension before STALL_MS timeout so bridging no longer waits for 4s stall cycles each step. npm test: 6/6 pass."
  - "2026-04-03: Bridge inventory candidate resolution fix (BUGFIX-20260403-003): 'Cannot bridge void gap: no solid placeable blocks in inventory' was caused by strict bridge candidate filtering that required bot.registry.blocksByName[item.name] exact-match. In modded Forge inventories, placeable blocks often appear with namespace form (e.g. createbigcannons:built_up_heating) and may not resolve under that exact key, so candidates were incorrectly dropped to zero. Fix: chooseBridgeBlock now resolves both full and short names, relaxes to modded namespaced fallback candidates, excludes clear non-placeables, and adds inventory diagnostic logging when no candidate is found. Runtime verification after restart: ai_debug_AI_Bot_01.json shows bridge stack counts decreasing (64→61), confirming actual block placement during void bridging. npm test: 6/6 pass."
  - "2026-04-03: Bridge void-gap detection priority fix (BUGFIX-20260403-002): Root cause of bot jumping indefinitely at land's edge without building a bridge was that _stuckCount reset to 0 every time sidestep recovery moved the bot (~5 blocks perpendicular). The jump→jump→sidestep(resets!)→re-approach cycle prevented severity escalation to >4 (the old bridge trigger). Fix: added hasForwardGap priority check BEFORE the mild/moderate/severe tier branches. Any time isSafeForward is false AND hasForwardGap is true (void/air gap at ground level ahead), bridge attempt fires immediately regardless of stuckCount, with _stuckCount reset to 0 on success. Also overhauled tryBridgeForward: pathfinder now cleared and sneak set before placement (prevents bot from walking into void during async placeBlock), face selection changed from static array to dominant-backward-axis-first ordering with diagonal-safe cardinal selection, loop now returns placedCount>0 (partial success counts) instead of aborting on first bad step. npm test: 6/6 pass."
  - "2026-04-03: Bridge construction on void-edge stalls fixed (BUGFIX-20260403-001): added forward-gap recovery in goto stuck handling. When hazard checks block blind force-walk, bot now detects void gaps, selects a valid bridge block (preferred action.block/action.material when specified, otherwise best available full block), places forward support blocks, and retries navigation. Also added helpers: isAirLikeBlock/isSolidBridgeSupport/chooseBridgeBlock/hasForwardGap/tryBridgeForward. npm test: 6/6 pass."
  - "2026-04-01: Spatial grounding fix + MacroScreen cell-based UI (BUGFIX-20260401-001): (1) ClientChatEvent handler in ClientEvents.java sends immediate /api/entity_updates snapshot at chat-send time so targetedBlock is always fresh; entity_updates polling 100→40 ticks; BotCommand.cmdChat also snapshots mc.hitResult before POST. (2) MacroScreen fully rewritten: per-step EditBox cells with ↑/↓/✕ buttons, visual step-arrows, IF-TRUE/ELSE branch indicator, loop-back note, dynamic height, snippet buttons, 'Load Sample' 9-step demo macro, MacroManager.updateMacro added. npm test: not re-run (Java-only change)."
