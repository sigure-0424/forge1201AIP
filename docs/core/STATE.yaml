  - "2026-03-29: v0.1.1-beta additional features (BUGFIX-20260329-003): Node.js: Bug #9 water/boat (_shouldUseBoat helper, liquidCost 8 in goto, boat handoff); Bug #3 blackboard (_readBlackboard/_writeBlackboard, BLACKBOARD_FILE, blackboard_set/get actions, blackboard context in LLM prompt, SHARED BLACKBOARD section); safe zones (SAFE_ZONES_FILE, _loadSafeZones, _isInSafeZone, collect skip, goto warn); web_ui_server.js GET/POST/DELETE /api/safezones. Forge aux mod (aux_mod/): Gradle project (build.gradle/settings/properties), AuxMod.java, ForgeAIPConfig.java, BotStatus.java, SafeZoneManager.java (+dimension field), MacroManager.java, OrchestratorClient.java (WebSocket+HTTP/java.net.http), BotStatusHUD.java, MacroScreen.java, ClientEvents.java (F8 HUD toggle, F9 macro screen, entity tracking every 100 ticks, login/logout lifecycle), BotCommand.java (/bot list/start/stop/chat), SafeZoneCommand.java (/safezone add/addbox/remove/list). npm test: 6/6 pass."
  - "2026-03-29: v0.1.1-beta four-issue batch (BUGFIX-20260329-001): (1) Bug Fix 1 — End movement flush: bot.clearControlStates() on portal dimension change + 2s/1s settle delay + up-to-3s airborne wait for obsidian platform landing + second setGoal(null)/clearControlStates flush after landing. (2) Bug Fix 2 — queue_op interrupt handling: EXECUTE_ACTION accepts queue_op=replace/append/ignore; agent_manager extracts meta-object from LLM array, passes as msg.queue_op; current task context and full queue_op docs injected into LLM prompt. (3) Bug Fix 7 — Exponential backoff reconnect: scheduleRestart uses 5→10→20→30s capped backoff via restartAttempts Map; resets on first BOT_STATUS. (4) Bug Fix 10 — Task queue checkpoint: _saveQueueCheckpoint/_loadQueueCheckpoint/_clearQueueCheckpoint in bot_actuator.js; save on replace-path EXECUTE_ACTION; clear on processActionQueue normal exit; restore on spawn if no buffered actions and checkpoint <10 min old. npm test: 6/6 pass."
  - "2026-03-28: 12-issue system overhaul (BUGFIX-20260328-001): (1) Ender Dragon combat: _inBossCombat flag suppresses generic AoE/passive-defense intervals during boss fights; perch detection velocity threshold relaxed (x/z 0.05→0.1); dragon melee uses jump-crit pattern. (2) Critical hits: 200ms fall-phase wait after jump before melee swing in all combat loops. (3) Autonomic hunger: independent 8s setInterval eats best food when food<18, restores prior held item, never touches action queue. (4) Mid-air kick prevention: processActionQueue waits up to 3s for bot.entity.onGround at entry. (5) MLG water bucket: trigger fallDist>4 (was >5), groundDist<=6 (was <=4), search depth 15→20. (6) Shield equip: n.endsWith('_shield') added to cover modded variants. (7) Tag-based collection/crafting: MATERIAL_TAG_GROUPS map (all log/plank variants, stone group, cobblestone group) with collect fallback and variant-aware ingredient satisfaction in pre-craft loop; comprehensive FUEL_PRIORITY covering all log/plank variants. (8) LLM feedback control (agent_manager.js): consecutiveFailures Map; SUCCESS_PATTERNS expanded (Eliminated/Crafted/Smelted/etc.); FAILURE_PATTERNS expanded (failed/not found/cycle/timed out/Task Remaining); 3-failure cap clears queue and halts with graceful chat; reset on success. (9) Autonomous idle maintenance: new 30s setInterval checks tool durability (<5% → queue craft replacement) and smelt raw food when furnace within 16 blocks and >=4 raw items available. (10) Wiki RAG (src/wiki_rag.js): inverted-index search over data/wiki/ .md/.txt files; searchForPrompt() injected into LLM prompt builder; seed wiki files: combat.md, crafting.md, survival.md. (11) Runtime config (src/runtime_config.js): mutable constants (MELEE_RANGE, RETREAT_HEALTH_PCT, crit timing, pathfinder limits, collect timeouts, etc.); savePreset/loadPreset/listPresets persisted to data/system_presets.json; patch_config action wired into bot_actuator.js dispatch; patch_config docs added to LLM prompt. npm test: 6/6 pass."
  - "2026-03-27: Ender Dragon combat overhaul (BUGFIX-20260327-004): (1) Phase 1 — skip crystals entirely if none present; approach pillar XZ base only (GoalXZ, not GoalNear to top); detect 'dragon_breath' alongside 'area_effect_cloud'. (2) Phase 2 — replaced GoalFollow chase with center-positioning strategy (GoalXZ 0,0); bow range expanded to 80 blocks (was 40, never reached due to dragon altitude); perch check adds dv.y<0.05; on perch navigate toward fountain then use bow (dist>4) or melee; out-of-range returns to center instead of chasing perimeter. (3) agent_manager — CRITICAL rule injected when dimension==='the_end' restricts LLM to kill/goto/eat/equip only, preventing blaze rod collection etc. inside the End. (4) README — End Portal lava requirement note added. npm test: 5/6 pass (E2E pre-existing)."
  - "2026-03-27: Six-issue batch (BUGFIX-20260327-003): (1) Neutral mob handling — HOSTILE_MOBS split; NEUTRAL_MOBS set (enderman, zombified_piglin, spider, wolf, bee, etc.) added; _aggroedNeutrals Set tracks entity IDs that have attacked the bot; health event marks nearby neutrals as aggro'd on damage; findNearestHostile includes aggro'd neutrals; anti-AFK head rotation avoids looking at non-aggro'd Endermen within 64 blocks. (2) Bed/respawn — file-based bed_lock.json (8s cooldown) serializes multi-bot access in arrival order; bot wakes immediately (300ms then bot.wake()) after set_respawn so bed is freed. (3) GraveStone recovery — tries bot.openContainer() first (4s timeout) and takes all slots via clickWindow before falling back to digging. (4) AoE damage evasion — 800ms interval detects area_effect_cloud/dragon_breath within 5 blocks OR stationary-damage pattern (health drop + <0.5b movement); triggers GoalXZ flee + underwater jump. (5) Ender Dragon combat — new _killEnderDragon() function: Phase 1 destroys end crystals (bow preferred, melee fallback); Phase 2 attacks dragon (melee during perch, ranged when flying); flees breath clouds throughout; dispatched from kill action when target==='ender_dragon'. (6) Boat fix — water search 32→48 blocks; skip navigation if already in/near water; lookAt before placeBlock then activateItem fallback; spawn wait 600ms→1500ms; entity search near bot (10b) instead of waterBlock (6b); includes 'boat' substring match. npm test: 5/6 pass (E2E pre-existing)."
  - "2026-03-27: Bulk bot spawning + Sentry crash reporting (TASK-20260327-002): (1) Bulk spawn — new POST /api/bots/bulk endpoint in web_ui_server.js takes {count,host?,port?}, auto-generates AI_Bot_XX names (skipping running bots), returns {ok,botIds[]}; _nextBotNames() shared helper; Manage Bots modal now has 'Spawn Multiple Bots' section with count/host/port inputs and ⚡ Spawn Bots button; CLI adds spawn_bots <count> command; index.js exposes nextBotNames() helper. (2) Sentry crash reporting — new src/sentry_reporter.js: loadPrefs/savePrefs/getPrefs persisted in data/crash_report_prefs.json; needsConsent() check; initSentry(dsn) initializes @sentry/node with beforeSend PII scrubber (strips IPs, hostnames, env vars OLLAMA_URL/API_KEY/MC_HOST; strips user/request/breadcrumbs; truncates file paths; scrubs error messages); captureException/captureMessage helpers; index.js rewritten as async main() — shows one-time CLI consent prompt (only if stdin.isTTY) with security/privacy disclosure, saves y/n/dontAskAgain; hooks Sentry into AgentManager ERROR IPC; web_ui_server.js adds GET/PUT /api/crash-prefs routes; index.html adds Sentry consent modal with privacy notice, what-is/what-isnt-sent lists, SOC2 note, don't-ask-again checkbox, Accept/Decline buttons; app.js checks /api/crash-prefs 800ms after boot and shows modal if needsConsent=true. SENTRY_DSN must be set in .env. npm test: 5/6 pass (E2E pre-existing)."
  - "2026-03-27: Six-feature batch (BUGFIX-20260327-001): (1) Craft robustness — craft action now checks direct ingredients against live inventory and auto-prepends intermediate craft steps (e.g. oak_log→planks→boat) before attempting the final craft; cycle guard via _craftPath prevents infinite loops; crafting table search radius 4→32 blocks. (2) Equipment collection fix — withdrawNeededEquipment uses mutable alreadyHaveNames Set so items taken mid-loop aren't re-taken from duplicate container slots. (3) Equipment swapping — equip action auto-detects destination slot from item name (helmet→head, chestplate→torso, carved_pumpkin→head, shield→off-hand, etc.); supports optional slot param; unequips current item in target slot before equipping; equipBestArmor no longer downgrades (skips equip if current armor tier ≥ inventory armor). (4) Auto-shredder — _junkList (Set) loaded from data/junk_list.json (defaults: granite, diorite, andesite, tuff, calcite, dirt, gravel, netherrack, rotten_flesh, poisonous_potato, ink_sac); _runAutoShredder() fires every 5 s when ≥32/36 slots used, tosses junk items; shredder_add/shredder_remove actions let LLM add or remove entries. (5) Multi-bot coordination — processChatWithLLM intercepts ask_bot actions and routes them as async USER_CHAT to target bot; LLM prompt includes OTHER BOTS section (pos/hp/food/top-6-inv items), coordinator note (lexicographically first bot), and ask_bot action docs. (6) Boat navigation — boat action: auto-crafts oak_boat if needed, finds nearest water within 32 blocks, navigates to edge, places boat, mounts, steers toward x/z destination until within 5 blocks, dismounts. npm test: 5/6 pass (E2E pre-existing failure unrelated)."
  - "2026-03-26: WebUI dashboard (TASK-20260326-003): (1) src/web_ui_server.js — Express+ws server on port 3000 (WEBUI_PORT env); REST API: GET/POST /api/bots, DELETE /api/bots/:id, POST /api/bots/:id/chat, POST /api/bots/:id/restart, GET /api/bots/:id/log, GET|PUT /api/config, GET|DELETE /api/waypoints/:name; WebSocket broadcasts bot_status/bot_chat/bot_connected/bot_disconnected events; (2) public/index.html — single-page dashboard: sidebar bot cards (health/food bars, position, current action), chat panel with bot selector + send box (no prefix needed), status panel with live inventory grid + armor/equipment display, Manage Bots modal (add/restart/remove), Settings modal (Ollama URL/model/key); (3) public/style.css — dark theme; (4) public/app.js — WebSocket client, REST fallback, optimistic chat display; (5) bot_actuator.js — 5s debug loop now also sends BOT_STATUS IPC with inventory[] and armor{} fields; (6) agent_manager.js — botStatus Map, chatLog Map (200 entries/bot), onEvent callback, _appendChatLog(), BOT_STATUS IPC handler, bot_connected/bot_disconnected hooks; (7) index.js — starts WebUIServer after AgentManager; (8) run.bat — Windows plug-and-play launcher (checks Node, npm install, creates .env); (9) package.json — added start script, express+ws in deps. npm test: all 6 pass."
  - "2026-03-26: Equipment-chest system overhaul (TASK-20260326-002): (1) isMissingGear() helper — returns true if any armor slot empty or no weapon held; (2) getEquipmentContainerIds() — returns block IDs for chest, barrel, and all shulker_box colour variants; (3) withdrawNeededEquipment(window) — takes at most 1 of each missing tool/weapon and 1 of each missing armor piece instead of looting everything; (4) loot_chest_special updated to use withdrawNeededEquipment and now accepts barrel and shulker_box in addition to chest; (5) Idle scanner: removed break so ALL smooth_stone-marked containers are queued (multi-chest support); also re-visits previously looted chests when isMissingGear() is true; (6) Spawn scanner: same multi-container, multi-chest fixes; (7) New find_and_equip action: scans radius (default 32b) for smooth_stone-marked containers, navigates to each, withdraws needed gear, equips best; registered in agent_manager LLM prompt. npm test: all 6 pass."
  - "2026-03-26: (1) Kill: passive mob flee disabled — bot no longer flees from cow/pig/chicken at low HP (only hostile mobs trigger flee); (2) Kill: wander covers all 4 cardinal directions — reduced per-direction timeout 20s→12s, inner-break threshold combatMs-30000→combatMs-10000; (3) Kill: eat/retreat health check skipped for passive mobs; (4) find_land: step 5 returns bot to gx/gz before summoning animals so kill tests find them at land base; (5) find_land: _treeDir recorded when tree reached (direction from gx/gz to tree), written to debug file every 5s; (6) find_land: return-to-base in step 5 recomputes gx/gz from actual returned position; (7) test_live: collectTerrainDir captures direction from land base to post-collect position (where bot navigated to logs); (8) test_live: goto direction priority treeDir > collectTerrainDir > heuristic > -X fallback; (9) test_live: if goto_medium fails, direction flipped for goto_long (avoids west mountain range); (10) test_live: returnToLandBaseForKill() returns bot to land base between kill attempts; (11) test_live: goto_short speed threshold 1.0→0.7 b/s (water near anchor can legitimately slow to 0.85 b/s). Result: run38 8/9 passed (run35 was 6/11). (BUGFIX-20260326-001)"
  - "2026-03-25: (1) Bug: const logBlocks→let logBlocks in ensureToolFor — `const` was reassigned on wider-radius fallbacks, throwing TypeError when nearest log >32 blocks. (2) Bug: goto completion message used action.z instead of destZ — wrong distance reported when using named waypoints. (3) Bug: kill inner combat while loop lacked combatMs check — bot fought indefinitely past timeout, causing test harness kill_cow to always time out; added Date.now()-combatStart<combatMs to inner loop. (4) Test: added waitForFreshDebug helper — waits for ai_debug file timestamp newer than goto completion, fixing accuracy measurement (was 25 blocks, now 3 blocks). (5) Test: added _receivedAt timestamp to IPC messages + filtered waitForMessage by start time — prevents kill message bleedover between sequential tests. (6) Test: per-bot debug files (ai_debug_${botId}.json) — prevents two-bot overwrite race. (7) Test: second bot AI_Bot_02 as moving follow target — testFollow now uses real cross-bot following instead of hardcoded Seia_Y. Live result: 6/9 passed; 3 goto speed failures are water-terrain-only (fixed by Seia_Y being online for find_land). (BUGFIX-20260325-007)"
  - "2026-03-25: (1) Issue 1 - Lava fall bug: added isSafeForward(angleRad) helper that checks 3 blocks ahead for lava/fire/magma and verifies solid ground within 3 blocks below (cliff guard); both the XYZ-step loop and XZ goto loop force-walks are now gated on isSafeForward — if blocked, the force-walk is skipped and a 'Blocked by hazard' message is logged instead of walking into lava. (2) Issue 2 - Async lookahead pathfinding: XZ goto loop fully rewritten from await-based per-step pattern to streaming goal approach: bot.pathfinder.setGoal(GoalXZ, true) is set for the first segment immediately; while polling at 250ms, when the bot comes within HANDOFF_DIST=14 blocks of the current waypoint, goal immediately switches to the next segment — path computation for segment N+1 begins while bot is still moving through segment N, eliminating inter-segment stops. (3) Issue 3 - Stability: stuck detection is now time-based (STALL_MS=4000ms) rather than per-step iteration count; tiered recovery: mild (≤2 stalls) = jump, moderate (≤4 stalls) = sidestep, severe (>4 stalls) = isSafeForward-gated force-walk, abort after 7 attempts. (BUGFIX-20260325-006)"
  - "2026-03-25: (1) Issue 1 - Auto waypoint: after goto completes and in the 30s idle scan, nearby_structures is checked and any detected structure auto-saved as a named waypoint; (2) Issue 2 - Path caching: new loadPathCache/savePathCache helpers + XZ goto loop replays cached waypoints (12h TTL, 16-block quantized key), saves route on success, abandons on ≥2 consecutive misses; (3) Issue 3 - Pathfinding speed: XYZ-step and XZ-waypoint catches now have two-tier fallback: half-step with thinkTimeout=3000ms (max 3s wait vs 15s), then force-walk forward+sprint 1.5s; (4) Issue 4 - Combat tactics: melee rewritten with ATTACK_COOLDOWN_MS=625 (_lastAttack tracking), bot attacks only when cooldown ready then flees directly away RETREAT_DIST=7 blocks; (5) Issue 5 - Movement consistency: all combat short-range movement switched from goto().catch() to setGoal(..., true) — projectile dodge, ranged back-off, melee retreat now non-competing. (BUGFIX-20260325-005)"
  - "2026-03-25: (1) Issue 1 - Nether recovery no-path: recover_gravestone navigation replaced single GoalNear with 32-block XZ step loop (same as goto action) so complex Nether terrain is traversed incrementally; final GoalNear used for last-hop precision. (2) Issue 2 - Projectile evasion: detection range 12→20 blocks, inbound dot threshold 0.35→0.2 (catches slower Blaze fireballs); dodge replaced pathfinder.goto(GoalXZ) with direct setControlState right/left/back/forward + sprint + jump for 400ms — works in Nether where GoalXZ fails with no-path. (BUGFIX-20260325-004)"
  - "2026-03-25: (1) Issue 1 - Fortress awareness: getEnvironmentContext() scans 32-block radius for structure markers (nether_bricks→nether_fortress, end_portal_frame→stronghold) and adds nearby_structures + dimension to every LLM context payload. (2) Issue 2 - Combat range: canRanged check falls back to melee when snowballs+bow exhausted; re-equips snowball each loop tick; throws snowballs at 16–20 blocks while chasing (extended range attack). (3) Issue 3 - Projectile evasion interrupt: new 150ms setInterval independent of kill-loop: raises shield on inbound projectile, else pathfinds to safe perpendicular direction (lava/cliff check before committing). (4) Issue 4a - botPos TDZ: const botPos moved to loop top, eliminating 'Cannot access before initialization' crash. (4b) navigate_portal no-path: catch block breaks out of waypoint loop immediately on 'No path to the goal' to prevent 38400ms×N stall and keepalive timeout. (BUGFIX-20260325-003)"
  - "2026-03-25: (1) Issue 1 - Pathfinding: WAYPOINT_STEP 64→32 blocks, halving A* search space to eliminate 'Took too long to decide path' timeouts on complex/modded terrain. (2) Issue 2 - Death recovery: bot.on('death') now sends IPC USER_CHAT with username='System' so agent_manager correctly sets awaitingRecoveryChoice (previous bug: bot.chat() is filtered by bot.on('chat') so the message never reached agent_manager). (3) Issue 3/5/6 - Combat interrupt & detection: passive defense range 3.5→16 blocks; movement guard removed so bot attacks within 3.5 blocks even during pathfinding; added runWaitLoop() idle-combat function that fights hostiles within 16 blocks and chases within 12; processActionQueue auto-enters runWaitLoop after completing all actions (unless _inStopMode); new 'wait' action enters runWaitLoop immediately; 'stop' sets _inStopMode=true preventing idle combat. (4) Issue 4 - Status feedback: goto and kill actions now send bot.chat completion messages. (5) Issue 5 - Projectile detection range: 10→20 blocks in kill combat loop; anti-AFK changed from isExecuting guard to isMoving guard so it fires during idle combat. (6) Issue 6 - stop/wait distinction: stop=completely stationary, wait=idle combat. Auto-transition to wait after every instruction. LLM prompt updated with wait/stop documentation. (BUGFIX-20260325-002)"
  - "2026-03-25: (1) Issue 1 precaution - Invisibility: on spawn check for effect ID 14 and drink milk to clear it. (2) Issue 2 - Fall/lava: MLG water-bucket now triggers regardless of pathfinder movement state (removed !moving restriction); added lava-at-feet detection in physicsTick that cancels pathfinder and forces jump escape (_lavaEscapeActive flag prevents re-trigger). (3) Issue 3 - Chat filter: bot.on('chat') ignores all messages not starting with '-'; prefix is stripped before forwarding to agent_manager. (4) Improvement 1 - Async queries: '-!' prefix sets async:true on USER_CHAT; agent_manager routes to processAsyncQuery() which calls LLM without touching the action queue and delivers response via ASYNC_CHAT IPC (bot speaks immediately without cancelling current action). (5) Improvement 2 - No mining during come: come action disables movements.canDig=false during GoalFollow, restored on action end. (BUGFIX-20260325-001)"
  - "2026-03-24: Fixed navigate_portal ECONNRESET during movement: grid scan and waypoint navigation now use canDig=false Movements (restored after scan). Without this, pathfinder broke blocks during portal search, triggering VeinMiner chain-reactions (EventDebouncer mass-destruction), causing rapid terrain changes, movement desync, and ECONNRESET. Also added CASCADING_WAIT pause in grid scan loop: bot waits (max 3s) for terrain to settle before sending more movement packets. (BUGFIX-20260324-004)"
  - "2026-03-24: Fixed ECONNRESET root cause: Proxy in dynamic_registry_injector.js used a LINEAR scan (O(N), N≈25000) instead of binary search to find the block owner for uncached state IDs. On the first bot.findBlock(maxDistance:256) call in navigate_portal, tens of thousands of unique modded state IDs were resolved — each doing a 25000-step scan — blocking the event loop for several seconds, causing the server keepalive ACK to be missed, and the server to RST the connection (ECONNRESET). Fix: replaced linear scan with true binary search (O(log N)≈15 steps). Also added setImmediate yield before findPortalAll() to flush pending packets before the scan. (BUGFIX-20260324-003)"
  - "2026-03-24: (1) bot.on('end') now triggers AgentManager recovery (was silently swallowed, causing permanent dead-connection when server sends FIN). (2) scheduleRestart preserves original host/port via botConnOptions Map (was passing {isRestart:true} → bot reconnected to localhost:25565 fallback). (3) processActionQueue checks socket.writable at start of every action — drops queue and triggers recovery if socket is dead (prevents ECONNRESET from writing to dead socket mid-action). (4) navigate_portal guards bot.chat/goto with isConnected() after portal found. (5) Anti-AFK: setInterval every 25s rotates bot head when idle/not executing, preventing server AFK-kick during LLM processing window. (6) Added 'Disconnected' case to triggerRecoveryPipeline. (BUGFIX-20260324-002)"
  - "2026-03-24: (1) Death recovery respawn fallback: 3s setTimeout after spawn scans inventory for gravestone death-marker items (X/Y/Z coord pattern) and falls back to last_death.json if <15min old — auto-queues recover_gravestone when no recover action pending. (2) navigate_portal enhanced: checks internal waypoints by keyword first, then expands search radius 128/256 blocks, then explores cardinal directions up to 512 blocks; saves portal position as waypoint on success. (3) goto XYZ timeout 60s→120s; distant targets (>64 XZ blocks) now XZ-step to within 32 blocks before final XYZ approach (avoids A* 3D planning on huge routes). (4) Combat loop rewrite: shield equip retry loop pre-battle; _shieldUntil replaces _shieldCooldown; melee adds post-attack strafe; projectile detection uses velocity dot-product to confirm inbound trajectory. (5) Ranged combat: non-blocking bow-charge via _bowCharging state; IDEAL_MIN/MAX engagement range; LoS check before shooting; falls back to repositioning if no LoS. (TASK-20260324-001)"
  - "2026-03-23: (1) Issue 1 - Task management: executeTaskModeTasks now one-at-a-time; task-object format [{id,status,description}] feeds tasks to LLM; completeCurrentTask marks done and advances; all tasks completed → returns to normal mode. (2) Issue 2 - Combat/parkour: MLG water-bucket on free-fall >8 blocks; kill action uses bow for ranged enemies (blaze,ghast,phantom); per-tick fireball/projectile detection → shield raise or perpendicular dodge; Blaze combat seeks nearby water for fire resistance; shield timing improved (raise after melee hit, lower when clear). (3) Issue 3 - Death recovery: _lastSafePos tracked every 5s on ground; death handler uses _lastSafePos instead of unreliable bot.entity.position; saves to data/last_death.json; recover_gravestone now handles cross-dimension (prepends navigate_portal), searches 32-block radius in 3 passes, waits for chunk load. (4) Issue 4 - Auto-equip: 15s idle interval calls equipBestArmor+equipBestWeapon; also fires on spawn/respawn. (5) Issue 5 - Cheat command restriction: added DEBUG constant; all /tp, /effect, /give calls in spawn/find_land wrapped with DEBUG guard; non-debug path uses pathfinder+swim for water escape; frozen watchdog uses jump instead of /tp in non-debug. (TASK-20260323-002)"
  - "2026-03-23: (1) Fixed stuck-recovery block pollution: replaced permanent blocksCantBreak/blocksToAvoid mutation with jump + perpendicular sidestep escape (no session-wide side effects); (2) goto to lower Y now tries no-dig first (prefers caves/stairs), falls back to digging only if no natural path found; (3) Idle equipment chest scanner: every 30s when idle, scans 32-block radius for chests on smooth_stone and auto-loots (deduped via _lootedChests Set); (4) Structure /locate integration: goto target matching STRUCTURE_NAMES map issues /locate command, parses [X:N, ~, Z:N] from server chat response; (5) Internal waypoint system: data/waypoints.json with name/x/y/z/dimension, add_waypoint action, goto resolves internal waypoints first with cross-dimension portal pre-navigation; (6) README updated with full action reference, waypoint docs, and screen recording guide (TASK-20260323-001)"
  - "2026-03-22: Fixed isInWater false positive on stone field: DynamicRegistryInjector Proxy fallback was returning the water block object (registry id=32) for unknown Forge stateIds that landed just above vanilla water stateId range 80-95; prismarine-physics then set isInWater=true causing sprint=false and bot spinning in circles. Fix: Proxy get handler now intercepts liquid-block fallbacks and returns stoneTemplate instead; LIQUID_NAMES set covers water/lava/flowing_water/flowing_lava (BUGFIX-20260322-003)"
  - "2026-03-22: Fixed find_land and movement bobbing: (1) find_land now TPs to Seia_Y/any online player instead of /fill (which always failed in all-ocean world — water immediately refilled any stone); (2) physicsTick handler now sets jump=false in water to prevent jump=true persisting from prior land state causing vertical bobbing at 0.28 b/s; (3) testKill filter narrowed to 'Failed to kill' (was 'Failed') to prevent come-action's 'Failed to find Seia_Y' message from being matched (BUGFIX-20260322-002)"
  - "2026-03-22: Added find_land action (uses /spreadplayers 0 0 0 2000 false <bot>) to scatter bot to random dry land before tests; modified test_live.js to call find_land after waitForReady, capture land base position, and use it for goto_return test instead of hardcoded ocean spawn (-10,-28) (BUGFIX-20260322-001)"
  - "2026-03-21: Added sprint-jumping (physicsTick listener after pathfinder's, ~7.1 b/s vs 5.6), robust goto (per-waypoint error recovery, 60s timeout, relaxed stuck detection), come goal auto-recovery (re-sets GoalFollow if cleared externally) (BUGFIX-20260321-006)"
  - "2026-03-21: Fixed follow broken by 6 compounding bugs: (1) self-defense handler called setGoal(null) on ANY damage, permanently destroying GoalFollow — removed; (2) spawn handler added duplicate event listeners on every respawn — guarded with _spawnInitDone flag; (3) boundingBox='empty' with shapes=full-cube caused pathfinder/physics disagreement (A* planned through solid blocks, physics blocked them) — reverted to consistent 'block'; (4) passive defense bot.attack() changed look direction during pathfinding — now skipped when isExecuting; (5) synchronous file I/O (appendFileSync/writeFileSync) blocked event loop 1-10ms per call — switched to async; (6) tickTimeout=40ms consumed 800ms/s CPU — restored to 10ms (original working value) (BUGFIX-20260321-005)"
  - "2026-03-21: Fixed follow 1-block/min: supervision loop was calling setGoal every 1s → resetPath every 1s, now only resets when entity object changes; fixed mod blocks defaulting to stone template → changed to air template (BUGFIX-20260321-003)"
