  - "2026-03-19: Added 11 boss-defeat actions (eat/smelt/kill/equip_armor/sleep/brew/enchant/explore/navigate_portal/activate_end_portal/place_pattern) + collect reliability fixes (TASK-20260319-004)"
  - "2026-03-19: Configured LLM client to support dotenv, API keys, and gpt-oss:20b-cloud model default (TASK-20260319-005-configure-llm-env)"
