  - "2026-03-20: Fixed bed/block perception (registry state-range fix), equipBestTool non-tool filter, collect early-abort on missing tool, VeinMiner debouncer wired, nearby_blocks in env context (BUGFIX-20260320-003)"
  - "2026-03-20: Fixed EXECUTE_ACTION race condition: await isExecuting before assigning new cancelToken (BUGFIX-20260320-002)"
