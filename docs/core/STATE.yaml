  - "2026-03-31: Five-issue bug fix batch (BUGFIX-20260331-001): (1) UI Status Sync — GET /api/bots and WS init now include restarting bots (botConnOptions not in bots map) as offline. (2) Auto End dragon combat — endDimNote changed to require explicit player instruction before kill(ender_dragon). (3) Irrelevant AI responses — new CRITICAL rule: never use chat action when a movement/task command was given. (4) Enderman eye contact in runWaitLoop — skip lookAt for non-aggro'd Endermen. (5) Mysterious End behavior — fixed by endDimNote change. npm test: 6/6 pass."
