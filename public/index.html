<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minecraft AI Player System WebUI</title>
    <style>
        body {
            background-color: #121212;
            color: #e0e0e0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
        }
        h1, h2 {
            color: #ffffff;
            border-bottom: 1px solid #333;
            padding-bottom: 5px;
        }
        .container {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
        }
        .panel {
            background-color: #1e1e1e;
            border-radius: 8px;
            padding: 15px;
            flex: 1;
            min-width: 300px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }
        .bot-card {
            border: 1px solid #444;
            border-radius: 6px;
            padding: 10px;
            margin-bottom: 15px;
            background-color: #252526;
        }
        .bot-header {
            font-size: 1.2em;
            font-weight: bold;
            color: #4da6ff;
            margin-bottom: 10px;
        }
        .stat-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
            font-size: 0.9em;
        }
        .stat-label {
            color: #aaaaaa;
        }
        .stat-value {
            color: #ffffff;
        }
        .health-bar-container {
            width: 100%;
            background-color: #333;
            height: 10px;
            border-radius: 5px;
            overflow: hidden;
            margin-top: 5px;
            margin-bottom: 10px;
        }
        .health-bar {
            height: 100%;
            background-color: #ff4d4d;
        }
        .inventory-list {
            list-style-type: none;
            padding: 0;
            margin: 0;
            font-size: 0.85em;
            max-height: 150px;
            overflow-y: auto;
        }
        .inventory-item {
            display: flex;
            justify-content: space-between;
            padding: 3px 0;
            border-bottom: 1px solid #333;
        }
        .task-list {
            list-style-type: decimal;
            padding-left: 20px;
            margin: 0;
            font-size: 0.85em;
        }
        .task-item.active {
            color: #ffd700;
            font-weight: bold;
        }
        .task-item.completed {
            text-decoration: line-through;
            color: #555;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            color: #aaaaaa;
        }
        input[type="text"] {
            width: calc(100% - 22px);
            padding: 10px;
            border: 1px solid #444;
            border-radius: 4px;
            background-color: #333;
            color: #ffffff;
            font-family: inherit;
        }
        button {
            padding: 10px 15px;
            background-color: #007acc;
            color: #ffffff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-family: inherit;
            font-weight: bold;
        }
        button:hover {
            background-color: #005999;
        }
        .chat-container {
            margin-top: 20px;
        }
        .chat-messages {
            height: 200px;
            overflow-y: auto;
            border: 1px solid #444;
            background-color: #252526;
            padding: 10px;
            border-radius: 4px;
            margin-bottom: 10px;
            font-family: monospace;
            font-size: 0.9em;
        }
        .chat-message {
            margin-bottom: 5px;
        }
        .chat-timestamp {
            color: #888;
            font-size: 0.8em;
            margin-right: 5px;
        }
        .chat-sender {
            font-weight: bold;
            color: #4da6ff;
            margin-right: 5px;
        }
        .chat-content {
            color: #ddd;
        }
        .config-group {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
            align-items: center;
        }
        .config-group label {
            min-width: 100px;
            margin-bottom: 0;
        }
        .bot-actions {
            margin-top: 10px;
        }
        .bot-actions button {
            background-color: #d9534f;
            padding: 5px 10px;
            font-size: 0.8em;
        }
        .bot-actions button:hover {
            background-color: #c9302c;
        }
    </style>
</head>
<body>

    <h1>Minecraft AI Player System</h1>

    <div class="container">
        <!-- Dashboard Panel -->
        <div class="panel" id="dashboard-panel">
            <h2>Bot Dashboard</h2>
            <div id="bots-container">
                <p>Waiting for bot data...</p>
            </div>
        </div>

        <!-- Controls Panel -->
        <div class="panel">
            <h2>Controls</h2>

            <div class="form-group">
                <label for="chat-bot-select">Target Bot:</label>
                <select id="chat-bot-select" style="width: 100%; padding: 8px; background: #333; color: white; border: 1px solid #444; border-radius: 4px;">
                    <option value="">Select a bot...</option>
                </select>
            </div>

            <div class="chat-container">
                <div class="chat-messages" id="chat-messages">
                    <!-- Chat messages will appear here -->
                </div>
                <div style="display: flex; gap: 10px;">
                    <input type="text" id="chat-input" placeholder="Enter command (e.g., come, goto 100 200)" style="flex-grow: 1;">
                    <button onclick="sendChat()">Send</button>
                </div>
            </div>

            <hr style="border-color: #333; margin: 20px 0;">

            <h3>Add New Bot</h3>
            <div class="form-group">
                <label for="new-bot-name">Bot Name:</label>
                <input type="text" id="new-bot-name" placeholder="e.g., AI_Bot_02">
            </div>
            <button onclick="addBot()">Add Bot</button>

            <hr style="border-color: #333; margin: 20px 0;">

            <h3>System Configuration</h3>
            <div class="config-group">
                <label for="config-model">LLM Model:</label>
                <input type="text" id="config-model" placeholder="e.g., gpt-oss:20b-cloud">
            </div>
            <div class="config-group">
                <label for="config-url">API URL:</label>
                <input type="text" id="config-url" placeholder="e.g., http://localhost:11434/api/generate">
            </div>
            <button onclick="updateConfig()">Update Configuration</button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let lastStatuses = {};

        function addChatMessage(sender, message) {
            const container = document.getElementById('chat-messages');
            const msgDiv = document.createElement('div');
            msgDiv.className = 'chat-message';

            const timeSpan = document.createElement('span');
            timeSpan.className = 'chat-timestamp';
            const now = new Date();
            timeSpan.textContent = `[${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}:${now.getSeconds().toString().padStart(2, '0')}]`;

            const senderSpan = document.createElement('span');
            senderSpan.className = 'chat-sender';
            senderSpan.textContent = sender + ':';

            const contentSpan = document.createElement('span');
            contentSpan.className = 'chat-content';
            contentSpan.textContent = message;

            msgDiv.appendChild(timeSpan);
            msgDiv.appendChild(senderSpan);
            msgDiv.appendChild(contentSpan);

            container.appendChild(msgDiv);
            container.scrollTop = container.scrollHeight;
        }

        function updateBotsUI(statuses) {
            const container = document.getElementById('bots-container');
            const select = document.getElementById('chat-bot-select');

            // Check if bots list changed to update select dropdown
            const currentBots = Object.keys(statuses);
            const knownBots = Array.from(select.options).map(o => o.value).filter(v => v !== '');

            if (currentBots.length !== knownBots.length || !currentBots.every(b => knownBots.includes(b))) {
                const currentValue = select.value;
                select.innerHTML = '<option value="">Select a bot...</option>';
                currentBots.forEach(botId => {
                    const option = document.createElement('option');
                    option.value = botId;
                    option.textContent = botId;
                    select.appendChild(option);
                });
                if (currentBots.includes(currentValue)) {
                    select.value = currentValue;
                } else if (currentBots.length > 0) {
                    select.value = currentBots[0];
                }
            }

            if (Object.keys(statuses).length === 0) {
                container.innerHTML = '<p>No active bots.</p>';
                return;
            }

            container.innerHTML = '';

            for (const [botId, data] of Object.entries(statuses)) {
                if(!data) continue;

                const card = document.createElement('div');
                card.className = 'bot-card';

                const healthPercent = Math.max(0, Math.min(100, (data.health / 20) * 100));

                let inventoryHtml = '';
                if (data.inventory && Array.isArray(data.inventory)) {
                    inventoryHtml = data.inventory.map(item => `
                        <li class="inventory-item">
                            <span>${item.name}</span>
                            <span>x${item.count}</span>
                        </li>
                    `).join('');
                } else {
                    inventoryHtml = '<li class="inventory-item">Empty</li>';
                }

                let taskHtml = '<em>No active tasks in queue.</em>';
                if (data.actionQueue && Array.isArray(data.actionQueue) && data.actionQueue.length > 0) {
                    taskHtml = `<ul class="task-list">`;
                    data.actionQueue.forEach((task, index) => {
                        const isCurrent = index === 0;
                        const actionStr = typeof task === 'string' ? task : JSON.stringify(task);
                        taskHtml += `<li class="task-item ${isCurrent ? 'active' : ''}">${actionStr}</li>`;
                    });
                    taskHtml += `</ul>`;
                }

                card.innerHTML = `
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                        <div class="bot-header" style="margin-bottom: 0;">${botId}</div>
                        <div class="bot-actions">
                            <button onclick="stopBot('${botId}')">Disconnect</button>
                        </div>
                    </div>

                    <div class="stat-row">
                        <span class="stat-label">Position:</span>
                        <span class="stat-value">${data.position ? `X:${Math.round(data.position.x)} Y:${Math.round(data.position.y)} Z:${Math.round(data.position.z)}` : 'Unknown'}</span>
                    </div>

                    <div class="stat-row">
                        <span class="stat-label">Health (${data.health || 0}/20):</span>
                        <span class="stat-value">${data.food ? `Food: ${data.food}/20` : ''}</span>
                    </div>
                    <div class="health-bar-container">
                        <div class="health-bar" style="width: ${healthPercent}%"></div>
                    </div>

                    <div style="display: flex; gap: 15px;">
                        <div style="flex: 1;">
                            <div class="stat-label" style="margin-bottom: 5px; border-bottom: 1px solid #444; padding-bottom: 3px;">Inventory</div>
                            <ul class="inventory-list">
                                ${inventoryHtml}
                            </ul>
                        </div>
                        <div style="flex: 1;">
                            <div class="stat-label" style="margin-bottom: 5px; border-bottom: 1px solid #444; padding-bottom: 3px;">Action Queue</div>
                            ${taskHtml}
                        </div>
                    </div>
                `;

                container.appendChild(card);
            }
        }

        socket.on('bot_status', (statuses) => {
            lastStatuses = statuses;
            updateBotsUI(statuses);
        });

        function sendChat() {
            const botId = document.getElementById('chat-bot-select').value;
            const input = document.getElementById('chat-input');
            const message = input.value.trim();

            if (!botId) {
                alert("Please select a target bot first.");
                return;
            }

            if (message) {
                socket.emit('send_chat', { botId, message });
                addChatMessage('WebUI', message);
                input.value = '';
            }
        }

        document.getElementById('chat-input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                sendChat();
            }
        });

        socket.on('config_status', (config) => {
            if (config.model) document.getElementById('config-model').value = config.model;
            if (config.url) document.getElementById('config-url').value = config.url;
        });

        function addBot() {
            const input = document.getElementById('new-bot-name');
            const botId = input.value.trim();
            if (botId) {
                socket.emit('add_bot', { botId });
                input.value = '';
                alert(`Requested to start bot: ${botId}`);
            }
        }

        function stopBot(botId) {
            if (confirm(`Are you sure you want to disconnect bot ${botId}?`)) {
                socket.emit('stop_bot', { botId });
            }
        }

        function updateConfig() {
            const model = document.getElementById('config-model').value.trim();
            const url = document.getElementById('config-url').value.trim();
            socket.emit('update_config', { model, url });
            alert("Configuration updated!");
        }
    </script>
</body>
</html>
